<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Payday Bank</title>
  <meta name="description" content="Digital banker for the Modern Payday board game. Track cash, loans, bills, and jackpots.">
  <meta name="application-name" content="Payday Bank">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Payday Bank">
  <meta name="theme-color" content="#2c1810">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="icon" href="icons/icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <style>
    :root, [data-theme="light"] {
      --bg: #e8d5b5;
      --bg-pattern: #dcc9a8;
      --surface: #fff8e7;
      --surface-alt: #f5e6c8;
      --text: #2c1810;
      --text-muted: #6b5344;
      --primary: #1a6b3c;
      --primary-hover: #145230;
      --accent: #c41e3a;
      --success: #1a6b3c;
      --warning: #b45309;
      --danger: #c41e3a;
      --loan: #c2410c;
      --savings: #0369a1;
      --jackpot: #6d28d9;
      --border: #c4a574;
      --shadow: 0 4px 12px rgba(44,24,16,0.15);
      --radius: 10px;
      --nav-bg: #2c1810;
      --nav-text: #fff8e7;
      --card-leader: #fef3c7;
      --card-danger: #fee2e2;
      --card-warning: #fffbeb;
    }
    [data-theme="dark"] {
      --bg: #1a1410;
      --bg-pattern: #241c16;
      --surface: #2c241c;
      --surface-alt: #3d3228;
      --text: #f5e6c8;
      --text-muted: #a89070;
      --primary: #4ade80;
      --primary-hover: #22c55e;
      --border: #5c4a3a;
      --shadow: 0 4px 12px rgba(0,0,0,0.4);
      --nav-bg: #0f0c0a;
      --card-leader: #3d3520;
      --card-danger: #3d2020;
      --card-warning: #3d3020;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, var(--bg-pattern) 10px, var(--bg-pattern) 11px);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    html { -webkit-text-size-adjust: 100%; }
    #app {
      max-width: 1280px; margin: 0 auto;
      padding: 0.75rem;
      padding-bottom: calc(5.5rem + env(safe-area-inset-bottom, 0px));
      padding-left: max(0.75rem, env(safe-area-inset-left, 0px));
      padding-right: max(0.75rem, env(safe-area-inset-right, 0px));
    }
    body.modal-open { overflow: hidden; }
    @media (display-mode: standalone) {
      #app { padding-top: max(0.75rem, env(safe-area-inset-top, 0px)); }
    }
    [hidden] { display: none !important; }

    /* Header */
    .app-header {
      background: var(--surface);
      border: 3px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      padding: 0.5rem 0.75rem;
    }
    .app-header.expanded { padding: 1rem; }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .header-top-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: 0;
    }
    .app-header h1 {
      font-size: 1.1rem;
      color: var(--accent);
      text-shadow: 1px 1px 0 var(--border);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .app-header.expanded h1 { font-size: 1.75rem; }
    .header-toggle-btn { flex-shrink: 0; min-height: 44px; min-width: 44px; padding: 0.35rem 0.6rem; }
    .header-details { text-align: center; margin-top: 0.75rem; }
    .app-header:not(.expanded) .header-details { display: none; }
    .app-header .subtitle { color: var(--text-muted); font-size: 0.9rem; }
    .header-row { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; align-items: center; margin-top: 0.75rem; }
    .save-status { font-size: 0.75rem; color: var(--success); padding: 0.15rem 0.4rem; border-radius: 4px; background: var(--surface-alt); }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem;
      padding: 0.65rem 1rem; font-size: 0.9rem; font-weight: 600; font-family: inherit;
      border: 2px solid var(--border); border-radius: var(--radius); cursor: pointer;
      min-height: 48px; touch-action: manipulation; transition: transform 0.1s, background 0.15s;
      background: var(--surface-alt); color: var(--text);
    }
    .btn:active { transform: scale(0.97); }
    .btn:focus-visible { outline: 3px solid var(--primary); outline-offset: 2px; }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary-hover); }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-danger { background: var(--danger); color: #fff; border-color: #9f1239; }
    .btn-accent { background: var(--accent); color: #fff; border-color: #9f1239; }
    .btn-sm { min-height: 44px; padding: 0.4rem 0.75rem; font-size: 0.8rem; }
    .btn-block { width: 100%; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-labeled { flex-direction: row; gap: 0.35rem; line-height: 1.2; }
    .btn-icon { font-size: 1.05rem; line-height: 1; flex-shrink: 0; }
    .btn-text { line-height: 1.15; }
    .player-actions .btn-labeled {
      flex-direction: column; gap: 0.2rem; padding: 0.45rem 0.3rem;
    }
    .player-actions .btn-labeled .btn-icon { font-size: 1.2rem; }
    .player-actions .btn-labeled .btn-text { font-size: 0.72rem; }
    .player-actions .btn-payday .btn-icon { font-size: 1.35rem; }
    .player-actions .btn-payday .btn-text { font-size: 0.82rem; font-weight: 800; }

    /* Forms */
    .form-group { margin-bottom: 0.85rem; }
    .form-group label { display: block; font-weight: 700; margin-bottom: 0.35rem; font-size: 0.9rem; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.65rem; font-size: 1rem; font-family: inherit;
      border: 2px solid var(--border); border-radius: var(--radius);
      background: var(--surface); color: var(--text); min-height: 48px;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,107,60,0.2);
    }
    .error-msg { color: var(--danger); font-size: 0.85rem; min-height: 1.2rem; margin-top: 0.25rem; }

    /* Setup */
    .setup-card {
      background: var(--surface); border: 3px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem; max-width: 520px; margin: 0 auto; box-shadow: var(--shadow);
    }
    .setup-card h2 { margin-bottom: 1rem; color: var(--accent); }
    .player-setup-row { display: grid; grid-template-columns: 1fr 100px; gap: 0.5rem; margin-bottom: 0.5rem; align-items: end; }
    .player-setup-row label { font-size: 0.8rem; font-weight: 600; }

    .panel-toggle.is-active {
      border-color: var(--primary);
      background: rgba(26, 107, 60, 0.1);
    }
    [data-theme="dark"] .panel-toggle.is-active { background: rgba(74, 222, 128, 0.12); }
    .collapsible-panel { margin-bottom: 1rem; }
    .collapsible-panel[hidden] { display: none !important; }

    /* Summary */
    .summary-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.5rem;
    }
    .summary-item {
      background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius);
      padding: 0.65rem; text-align: center; box-shadow: var(--shadow);
    }
    .summary-item .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); }
    .summary-item .value { font-size: 1.25rem; font-weight: 800; margin-top: 0.15rem; }
    .summary-item .value.cash { color: var(--success); }
    .summary-item .value.loan { color: var(--loan); }
    .summary-item .value.savings { color: var(--savings); }
    .summary-item .value.jackpot { color: var(--jackpot); }
    .summary-item .value.danger { color: var(--danger); }

    /* Jackpot */
    .jackpot-bar {
      background: linear-gradient(135deg, #5b21b6, #7c3aed); color: #fff;
      border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem;
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 0.75rem;
      box-shadow: var(--shadow); border: 2px solid #4c1d95;
    }
    .jackpot-bar .amount { font-size: 2rem; font-weight: 800; }
    .jackpot-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .btn-lottery {
      background: #fbbf24; color: #78350f; border: none; font-weight: 700;
    }
    .btn-lottery:hover { background: #f59e0b; }
    .btn-jackpot-six {
      background: #22c55e; color: #fff; border: none; font-weight: 700;
    }
    .btn-jackpot-six:hover { background: #16a34a; }
    .lottery-entrant {
      display: flex; gap: 0.5rem; align-items: center;
      padding: 0.35rem 0; border-bottom: 1px solid var(--border);
    }
    .lottery-player-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.4rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem;
    }
    .lottery-player-row:last-child { border-bottom: none; }
    .lottery-player-row.ok { color: var(--success); }
    .lottery-player-row.short { color: var(--danger); }
    .lottery-prize { font-size: 1.5rem; font-weight: 800; color: var(--jackpot); text-align: center; margin: 0.75rem 0; }

    /* Player board */
    .player-board-hint { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.75rem; }
    .player-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 1rem; }
    @media (min-width: 600px) { .player-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 960px) { .player-grid { grid-template-columns: repeat(3, 1fr); } }
    .player-picker-subtitle { font-size: 0.9rem; color: var(--text-muted); margin: 0.35rem 0 0; }
    .player-picker {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem;
      margin: 0.75rem 0 1rem;
    }
    @media (min-width: 480px) { .player-picker { grid-template-columns: repeat(3, 1fr); } }
    .player-pick-btn {
      display: flex; flex-direction: column; align-items: flex-start; gap: 0.15rem;
      padding: 0.75rem; border: 2px solid var(--border); border-radius: var(--radius);
      background: var(--surface); cursor: pointer; touch-action: manipulation;
      text-align: left; font-family: inherit; color: var(--text); min-height: 48px;
      box-shadow: var(--shadow);
    }
    .player-pick-btn:active { transform: scale(0.98); }
    .player-pick-btn.is-leader { background: var(--card-leader); }
    .player-pick-btn.negative { background: var(--card-danger); }
    .player-pick-btn.has-bills { border-left: 4px solid var(--warning); }
    .player-pick-btn.is-selected {
      border-color: var(--primary); border-width: 3px;
      box-shadow: 0 0 0 2px rgba(26,107,60,0.18);
    }
    .player-picker-group .player-picker { margin-top: 0.5rem; margin-bottom: 0.5rem; }
    .player-pick-name { font-size: 0.95rem; font-weight: 800; line-height: 1.2; }
    .player-pick-cash { font-size: 1.05rem; font-weight: 700; color: var(--success); }
    .player-pick-meta { font-size: 0.7rem; color: var(--text-muted); line-height: 1.3; }

    .player-card {
      background: var(--surface); border: 3px solid var(--border); border-radius: var(--radius);
      padding: 1rem; box-shadow: var(--shadow); position: relative;
    }
    .player-card.is-leader { border-color: #ca8a04; background: var(--card-leader); }
    .player-card.has-bills { border-left: 5px solid var(--warning); }
    .player-card.negative { border-color: var(--danger); background: var(--card-danger); }
    .player-card.has-loan { border-right: 5px solid var(--loan); }
    .leader-badge {
      position: absolute; top: -8px; right: 8px; background: #ca8a04; color: #fff;
      font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 999px;
    }
    .player-card.is-tied { border-color: #ca8a04; background: var(--card-leader); }
    .tied-badge {
      position: absolute; top: -8px; right: 8px; background: #b45309; color: #fff;
      font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 999px;
    }
    .player-name { font-size: 1.25rem; font-weight: 800; margin-bottom: 0.5rem; }
    .balance-row { display: flex; justify-content: space-between; margin-bottom: 0.25rem; font-size: 0.95rem; }
    .balance-row .amt { font-weight: 700; }
    .balance-row.cash .amt { color: var(--success); font-size: 1.5rem; }
    .balance-row.loan .amt { color: var(--loan); }
    .balance-row.savings .amt { color: var(--savings); }
    .balance-row.bills .amt { color: var(--warning); }
    .player-meta { font-size: 0.8rem; color: var(--text-muted); margin: 0.5rem 0; }
    .player-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; margin-bottom: 1rem; }
    .player-actions .btn { font-size: 0.8rem; min-height: 48px; padding: 0.5rem; }
    .player-actions .btn-payday { grid-column: 1 / -1; background: var(--accent); color: #fff; border-color: #9f1239; font-size: 0.9rem; }

    /* Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav-bg);
      display: flex; justify-content: space-around;
      padding: 0.35rem 0.25rem max(0.35rem, env(safe-area-inset-bottom, 0px));
      padding-left: max(0.25rem, env(safe-area-inset-left, 0px));
      padding-right: max(0.25rem, env(safe-area-inset-right, 0px));
      z-index: 50; border-top: 3px solid var(--border);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
      padding: 0.4rem 0.2rem; background: none; border: none; color: var(--nav-text);
      font-size: 0.65rem; cursor: pointer; opacity: 0.7; min-height: 52px; font-family: inherit;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:active { opacity: 1; transform: scale(0.94); }
    .nav-btn.active { opacity: 1; color: #fbbf24; }
    .nav-btn .icon { font-size: 1.25rem; }

    /* Panels */
    .panel { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
    .panel h2 { font-size: 1.1rem; margin-bottom: 0.75rem; color: var(--accent); }

    /* History */
    .history-filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
    .history-filters input, .history-filters select {
      flex: 1; min-width: 120px; padding: 0.65rem; font-size: 1rem;
      border: 2px solid var(--border); border-radius: var(--radius);
      background: var(--surface); color: var(--text); min-height: 48px;
    }
    .history-list { max-height: 400px; overflow-y: auto; }
    .history-item {
      display: grid; grid-template-columns: auto 1fr auto; gap: 0.5rem 0.75rem;
      padding: 0.65rem; border-bottom: 1px solid var(--border); font-size: 0.85rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-type { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; background: var(--surface-alt); }
    .history-amt { font-weight: 700; text-align: right; white-space: nowrap; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; }
    .stat-card { background: var(--surface-alt); border-radius: var(--radius); padding: 0.75rem; border: 1px solid var(--border); }
    .stat-card h3 { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.25rem; }
    .stat-card .val { font-size: 1.1rem; font-weight: 700; }

    /* Banker */
    .banker-quick { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.5rem; margin-bottom: 1rem; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -0.25rem; }
    .banker-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 520px; }
    .banker-table th, .banker-table td { padding: 0.5rem; border: 1px solid var(--border); text-align: left; }
    .banker-table th { background: var(--surface-alt); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.confirm-overlay {
      z-index: 250;
      background: rgba(0,0,0,0.65);
    }
    .confirm-modal { max-width: 400px; text-align: center; }
    .confirm-modal h3 { color: var(--accent); }
    .confirm-message {
      font-size: 1rem; line-height: 1.6; margin: 0.75rem 0 1rem;
      color: var(--text);
    }
    .confirm-detail {
      background: var(--surface-alt); border-radius: var(--radius);
      padding: 0.75rem; margin-bottom: 1rem; text-align: left; font-size: 0.9rem;
    }
    @media (min-width: 600px) { .modal-overlay { align-items: center; padding: 1rem; } }
    .modal {
      background: var(--surface); width: 100%; max-width: 480px;
      max-height: min(92vh, calc(100dvh - 1rem));
      overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
      padding: 1.25rem; padding-bottom: max(1.25rem, env(safe-area-inset-bottom, 0px));
      border-radius: var(--radius) var(--radius) 0 0;
      border: 3px solid var(--border); box-shadow: var(--shadow);
    }
    @media (min-width: 600px) { .modal { border-radius: var(--radius); } }
    .modal-with-keypad { max-width: 720px; }
    .modal-layout {
      display: flex; flex-direction: row; gap: 0.75rem; align-items: flex-start;
    }
    .modal-body { flex: 1; min-width: 0; max-width: 480px; }
    .modal-keypad {
      flex: 0 0 11.5rem; display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.35rem; padding: 0.25rem;
    }
    .keypad-btn {
      min-height: 48px; font-size: 1.25rem; font-weight: 700;
      border: 2px solid var(--border); border-radius: var(--radius);
      background: var(--surface-alt); cursor: pointer; touch-action: manipulation;
      font-family: inherit; color: var(--text); -webkit-tap-highlight-color: transparent;
    }
    .keypad-btn:active { transform: scale(0.96); background: var(--border); }
    .keypad-clear { font-size: 1rem; }
    .amount-entry {
      font-variant-numeric: tabular-nums; font-size: 1.25rem; font-weight: 700;
      min-height: 48px; width: 100%; padding: 0.65rem;
      border: 2px solid var(--border); border-radius: var(--radius);
      background: var(--surface); color: var(--text); cursor: pointer;
    }
    .amount-entry.is-active {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(26,107,60,0.18);
    }
    @media (max-width: 639px) {
      .modal-layout { flex-direction: column; }
      .modal-keypad { flex: none; width: 100%; }
    }
    .modal h3 { margin-bottom: 0.75rem; color: var(--accent); }
    .modal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .modal-actions .btn { flex: 1; }
    .note-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.5rem; }
    .note-chip {
      display: inline-flex; align-items: center; min-height: 40px;
      padding: 0.45rem 0.75rem; font-size: 0.8rem; border: 1px solid var(--border);
      border-radius: 999px; cursor: pointer; background: var(--surface-alt);
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .note-chip:hover, .note-chip:active, .note-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .bill-list { margin: 0.5rem 0; max-height: 200px; overflow-y: auto; }
    .bill-item { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; flex-wrap: wrap; padding: 0.65rem; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 0.35rem; font-size: 0.85rem; }
    .bill-item .btn { flex-shrink: 0; }
    .payday-summary { background: var(--surface-alt); border-radius: var(--radius); padding: 0.75rem; margin: 0.75rem 0; }
    .payday-line { display: flex; justify-content: space-between; padding: 0.25rem 0; font-size: 0.9rem; }
    .payday-line.total { font-weight: 800; border-top: 2px solid var(--border); margin-top: 0.5rem; padding-top: 0.5rem; }
    .checkbox-row { display: flex; align-items: center; gap: 0.65rem; padding: 0.65rem; background: var(--surface-alt); border-radius: var(--radius); margin: 0.5rem 0; min-height: 48px; }
    .checkbox-row input[type="checkbox"], .lottery-entrant input[type="checkbox"] { width: 1.25rem; height: 1.25rem; min-width: 1.25rem; flex-shrink: 0; }
    .checkbox-row label, .lottery-entrant label { flex: 1; cursor: pointer; line-height: 1.35; }
    .lottery-entrant { min-height: 48px; padding: 0.5rem 0; }
    .setup-check { display: flex; align-items: center; gap: 0.65rem; min-height: 48px; padding: 0.35rem 0; cursor: pointer; }
    .setup-check input[type="checkbox"] { width: 1.25rem; height: 1.25rem; min-width: 1.25rem; flex-shrink: 0; }

    /* Leaderboard / Winner */

  <script>
/* PAYDAY BANK - Application Logic */
(function () {
  'use strict';

  const STORAGE_KEY = 'payday-bank-v2';
  const LOTTERY_BANK_AMOUNT = 1000;
  const LOTTERY_PLAYER_AMOUNT = 100;
  const NOTE_PRESETS = ['Salary','Bill','Mail','Deal Card','Lottery','Yard Sale','Insurance','Radio Contest','Stock Purchase','Jackpot','Other'];
  const PAY_JACKPOT_NOTE_PRESETS = [
    'Car Boot Sale', 'Charity', 'Charity Concert', 'Date Night at the Casino', 'Family Pet',
    'Food for the Month', 'Fun Fair', 'Online Auction', 'Shopping Spree', 'Super Ski Sunday',
    'Supermarket', 'Transfer Money', 'Walk for Charity'
  ];
  const PAY_JACKPOT_NOTE_AMOUNTS = {
    'Date Night at the Casino': 500,
    'Family Pet': 300,
    'Food for the Month': 600,
    'Fun Fair': 200,
    'Shopping Spree': 500,
    'Super Ski Sunday': 500,
    'Supermarket': 200
  };
  const TRANSFER_NOTE_PRESETS = ['Birthday', 'Mad Money', 'Pay a Neighbour'];
  const TRANSFER_NOTE_AMOUNTS = { 'Birthday': 100 };
  const PAY_NOTE_PRESETS = ['Deal', 'Monster Charge', 'Other'];
  const RECEIVE_NOTE_PRESETS = ['Date Night at the Casino', 'Found a Buyer!', 'Pools', 'Radio Contest', 'Scratchcard'];
  const RECEIVE_NOTE_AMOUNTS = {
    'Date Night at the Casino': 500,
    'Pools': 5000,
    'Radio Contest': 1000
  };
  const TXN_LABELS = {
    bank_payment:'Bank Payment', bank_deposit:'Bank Deposit', player_transfer:'Player Transfer',
    loan_taken:'Loan Taken', loan_repaid:'Loan Repaid', loan_interest:'Loan Interest',
    savings_deposit:'Savings Deposit', savings_withdrawal:'Savings Withdrawal', savings_interest:'Savings Interest',
    payday_salary:'Payday Salary', bill_added:'Bill Added', bill_paid:'Bill Paid',
    jackpot_contribution:'Jackpot Contribution', jackpot_payout:'Jackpot Payout', jackpot_six:'Jackpot (Rolled 6)',
    lottery_draw:'Lottery Draw', manual_adjustment:'Manual Adjustment'
  };

  let state = defaultState();
  let activeModal = null;
  let soundsOn = false;
  let saveFlashTimer = null;
  let wakeLock = null;

  function defaultState() {
    return {
      gameStarted: false,
      enforceIncrements: true,
      startingBalance: 3500,
      jackpot: 0,
      players: [],
      transactions: [],
      theme: 'light',
      headerCollapsed: true,
      keepAwake: true,
      summaryOpen: undefined,
      jackpotOpen: undefined,
      peakBalances: {}
    };
  }

  function defaultPlayer(name, salary, cash) {
    return { id: uid(), name, cash, loan: 0, savings: 0, salary, paydayCount: 0, bills: [] };
  }

  function uid() {
    return crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
  }

  function $(sel) { return document.querySelector(sel); }
  function $$(sel) { return document.querySelectorAll(sel); }

  function money(n) {
    n = Number(n) || 0;
    return (n < 0 ? '-$' : '$') + Math.abs(Math.round(n)).toLocaleString();
  }

  function parseAmt(v) {
    const n = parseFloat(v);
    return isFinite(n) && n > 0 ? Math.round(n * 100) / 100 : null;
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function iconBtn(icon, text, className = 'btn btn-labeled', attrs = '') {
    return `<button type="button" class="${className}" ${attrs}><span class="btn-icon" aria-hidden="true">${icon}</span><span class="btn-text">${text}</span></button>`;
  }

  function editionRules() {
    return { loanRate: 0.10, repayInc: 1000 };
  }

  function getPlayer(id) { return state.players.find(p => p.id === id); }
  function playerName(id) {
    if (id === 'bank') return 'Bank';
    if (id === 'jackpot') return 'Jackpot';
    const p = getPlayer(id);
    return p ? p.name : '?';
  }

  function billsTotal(p) { return p.bills.reduce((s, b) => s + b.amount, 0); }
  function netWorth(p) { return p.cash - p.loan - billsTotal(p); }

  function flashSave() {
    const el = $('#save-status');
    el.textContent = 'Saved';
    el.hidden = false;
    clearTimeout(saveFlashTimer);
    saveFlashTimer = setTimeout(() => { el.textContent = ''; el.hidden = true; }, 1500);
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      flashSave();
    } catch (e) { console.warn(e); }
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      if (d && typeof d === 'object') {
        state = { ...defaultState(), ...d };
        state.players = (d.players || []).map(p => ({ ...defaultPlayer('', 0, 0), ...p, bills: p.bills || [] }));
      }
    } catch (e) { console.warn(e); }
  }

  function playSound(type) {
    if (!soundsOn) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = type === 'win' ? 880 : type === 'pay' ? 440 : 330;
      g.gain.value = 0.08;
      o.start(); o.stop(ctx.currentTime + 0.12);
    } catch (_) {}
  }

  function captureSnapshot(ids) {
    const snap = { jackpot: state.jackpot, players: {} };
    ids.forEach(id => {
      const p = getPlayer(id);
      if (p) snap.players[id] = { cash: p.cash, loan: p.loan, savings: p.savings, bills: JSON.parse(JSON.stringify(p.bills)), paydayCount: p.paydayCount, salary: p.salary };
    });
    return snap;
  }

  function restoreSnapshot(snap) {
    if (!snap) return;
    state.jackpot = snap.jackpot;
    Object.entries(snap.players || {}).forEach(([id, d]) => {
      const p = getPlayer(id);
      if (p) Object.assign(p, d);
    });
  }

  function trackPeak(p) {
    const nw = p.cash - p.loan;
    if (!state.peakBalances[p.id] || nw > state.peakBalances[p.id]) state.peakBalances[p.id] = nw;
  }

  function logTxn(type, amount, from, to, note, snap) {
    state.transactions.push({ id: uid(), timestamp: Date.now(), type, amount, from, to, note: note || '', undoSnapshot: snap });
  }

  function loanIncrement() {
    return editionRules().repayInc; // $1,000
  }

  /** Round shortfall up to the nearest official loan increment. */
  function calcAutoLoanAmount(shortfall) {
    if (shortfall <= 0) return 0;
    const inc = loanIncrement();
    return Math.ceil(shortfall / inc) * inc;
  }

  function validateLoanTakeAmount(amount) {
    const inc = loanIncrement();
    if (amount < inc) return `Loans must be at least ${money(inc)}.`;
    if (amount % inc !== 0) return `Loans must be taken in ${money(inc)} increments.`;
    return null;
  }

  function validateLoanBalance(remainingLoan) {
    if (remainingLoan <= 0) return null;
    const inc = loanIncrement();
    if (remainingLoan < inc) {
      return `Loan balance cannot be less than ${money(inc)}. Repay in full or leave at least ${money(inc)}.`;
    }
    if (remainingLoan % inc !== 0) {
      return `Loan balance must be in ${money(inc)} increments.`;
    }
    return null;
  }

  function validateRepayIncrement(amount) {
    if (!state.enforceIncrements) return null;
    const inc = editionRules().repayInc;
    if (amount % inc !== 0) return `Repayments must be in ${money(inc)} increments.`;
    return null;
  }

  /** Apply an auto-loan rounded up to official increments (e.g. $200 shortfall → $1,000 loan). */
  function applyAutoLoan(player, shortfall) {
    const loanAmount = calcAutoLoanAmount(shortfall);
    const loanErr = validateLoanTakeAmount(loanAmount);
    if (loanErr) return { ok: false, err: loanErr };
    player.cash += loanAmount;
    player.loan += loanAmount;
    return { ok: true, loanAmount };
  }

  /* ---- Core mutations (no logging) ---- */
  function mutateBankPayment(playerId, amount) { getPlayer(playerId).cash += amount; }
  function mutateBankDeposit(playerId, amount) { getPlayer(playerId).cash -= amount; }
  function mutateTransfer(fromId, toId, amount, allowLoan) {
    const payer = getPlayer(fromId);
    const recip = getPlayer(toId);
    const short = amount - payer.cash;
    if (short > 0) {
      if (!allowLoan) return { ok: false, err: `Insufficient cash (short ${money(short)})` };
      const lr = applyAutoLoan(payer, short);
      if (!lr.ok) return lr;
    }
    if (payer.cash < amount) return { ok: false, err: 'Insufficient cash' };
    payer.cash -= amount; recip.cash += amount;
    return { ok: true };
  }
  function mutateLoan(playerId, amount) {
    const loanErr = validateLoanTakeAmount(amount);
    if (loanErr) return { ok: false, err: loanErr };
    const p = getPlayer(playerId);
    p.cash += amount;
    p.loan += amount;
    return { ok: true };
  }
  function mutateRepay(playerId, amount) {
    const p = getPlayer(playerId);
    if (amount > p.loan) return { ok: false, err: 'Exceeds loan balance' };
    if (amount > p.cash) return { ok: false, err: 'Insufficient cash' };
    const incErr = validateRepayIncrement(amount);
    if (incErr) return { ok: false, err: incErr };
    const remaining = p.loan - amount;
    const balErr = validateLoanBalance(remaining);
    if (balErr) return { ok: false, err: balErr };
    p.cash -= amount;
    p.loan -= amount;
    return { ok: true };
  }
  function mutateJackpotContrib(fromId, amount) {
    const p = getPlayer(fromId);
    if (p.cash < amount) return { ok: false, err: 'Insufficient cash' };
    p.cash -= amount;
    state.jackpot += amount;
    return { ok: true };
  }
  function mutateJackpotPayout(toId, amount) {
    if (amount > state.jackpot) return { ok: false, err: 'Exceeds jackpot' };
    state.jackpot -= amount;
    getPlayer(toId).cash += amount;
    return { ok: true };
  }

  function doTxn(type, amount, from, to, note, mutateFn) {
    const ids = [];
    if (from && from !== 'bank' && from !== 'jackpot') ids.push(from);
    if (to && to !== 'bank' && to !== 'jackpot') ids.push(to);
    const unique = [...new Set(ids)];
    const snap = captureSnapshot(unique.length ? unique : state.players.map(p => p.id));
    snap.jackpot = state.jackpot;
    const result = mutateFn();
    if (result && result.ok === false) return result;
    logTxn(type, amount, from, to, note, snap);
    state.players.forEach(trackPeak);
    save(); render(); playSound('pay');
    return { ok: true, ...result };
  }

  function undo(n) {
    n = n || 1;
    for (let i = 0; i < n && state.transactions.length; i++) {
      const t = state.transactions.pop();
      restoreSnapshot(t.undoSnapshot);
    }
    save(); render();
  }

  /* ---- Payday ---- */
  function calcLoanInterest(p) {
    if (p.loan <= 0) return 0;
    return Math.round(p.loan * editionRules().loanRate);
  }

  function paydayCashAfterInterest(p) {
    return p.cash + p.salary - calcLoanInterest(p);
  }

  /** Valid loan repay amounts on Pay Day (after interest), per official $1,000 rules. */
  function getPaydayLoanRepayOptions(p) {
    const afterInt = paydayCashAfterInterest(p);
    const inc = loanIncrement();
    const amounts = [0];
    for (let repay = inc; repay <= Math.min(p.loan, afterInt); repay += inc) {
      if (validateLoanBalance(p.loan - repay) === null) amounts.push(repay);
    }
    if (p.loan > 0 && p.loan <= afterInt && validateLoanBalance(0) === null && !amounts.includes(p.loan)) {
      amounts.push(p.loan);
    }
    return amounts;
  }

  function processPayday(playerId, loanRepayAmount, autoLoan) {
    const p = getPlayer(playerId);
    const snap = captureSnapshot([playerId]);
    const salary = p.salary;
    const loanInt = calcLoanInterest(p);
    const billsDue = billsTotal(p);

    p.cash += salary;
    if (loanInt > 0) p.cash -= loanInt;

    if (loanRepayAmount > 0) {
      const rr = mutateRepay(playerId, loanRepayAmount);
      if (!rr.ok) { restoreSnapshot(snap); return rr; }
    }

    if (p.cash < billsDue) {
      if (!autoLoan) {
        restoreSnapshot(snap);
        return { ok: false, err: `Insufficient cash for all bills (${money(billsDue)} due). Enable auto-loan.` };
      }
      const lr = applyAutoLoan(p, billsDue - p.cash);
      if (!lr.ok) { restoreSnapshot(snap); return lr; }
    }

    p.cash -= billsDue;
    p.bills = [];
    p.paydayCount += 1;

    const repayNote = loanRepayAmount > 0 ? `, Loan repaid -${money(loanRepayAmount)}` : '';
    const note = `Salary +${money(salary)}, Interest -${money(loanInt)}${repayNote}, Bills -${money(billsDue)}`;
    logTxn('payday_salary', salary, 'bank', playerId, note, snap);
    trackPeak(p);
    save();
    render();
    playSound('win');
    return { ok: true };
  }

  /* ---- Modals ---- */
  function syncModalScrollLock() {
    document.body.classList.toggle('modal-open', !!$('#modal-root').children.length);
  }

  function closeAllModals() {
    $('#modal-root').innerHTML = '';
    activeModal = null;
    syncModalScrollLock();
  }

  function closeModal() {
    const root = $('#modal-root');
    if (root.lastElementChild) root.lastElementChild.remove();
    if (!root.children.length) activeModal = null;
    syncModalScrollLock();
  }

  function dismissModalOverlay(ov, cb) {
    ov.remove();
    syncModalScrollLock();
    cb?.();
  }

  function openConfirmModal({ title, message, detailHtml, confirmText, cancelText, danger, onConfirm, onCancel }) {
    const ov = document.createElement('div');
    ov.className = 'modal-overlay confirm-overlay';
    ov.onclick = e => {
      if (e.target === ov) dismissModalOverlay(ov, onCancel);
    };
    const m = document.createElement('div');
    m.className = 'modal confirm-modal';
    m.setAttribute('role', 'alertdialog');
    m.setAttribute('aria-modal', 'true');
    m.innerHTML = `
      <h3>${title}</h3>
      ${message ? `<p class="confirm-message">${message}</p>` : ''}
      ${detailHtml ? `<div class="confirm-detail">${detailHtml}</div>` : ''}
      <div class="modal-actions">
        <button type="button" class="btn" data-cancel>${cancelText || 'Cancel'}</button>
        <button type="button" class="btn ${danger ? 'btn-danger' : 'btn-primary'}" data-ok>${confirmText || 'Confirm'}</button>
      </div>`;
    m.querySelector('[data-cancel]').onclick = () => dismissModalOverlay(ov, onCancel);
    m.querySelector('[data-ok]').onclick = () => dismissModalOverlay(ov, onConfirm);
    ov.appendChild(m);
    $('#modal-root').appendChild(ov);
    syncModalScrollLock();
    m.querySelector('[data-ok]').focus();
  }

  function openModal(html, onMount) {
    closeAllModals();
    const ov = document.createElement('div');
    ov.className = 'modal-overlay';
    ov.onclick = e => { if (e.target === ov) closeModal(); };
    const m = document.createElement('div');
    m.className = 'modal';
    m.innerHTML = html;
    ov.appendChild(m);
    $('#modal-root').appendChild(ov);
    syncModalScrollLock();
    if (onMount) onMount(m);
    setupModalAmountKeypad(m);
    const inp = m.querySelector('input:not([type="checkbox"]):not(.amount-entry),select,textarea');
    if (inp) {
      inp.focus({ preventScroll: true });
      if (window.matchMedia('(pointer: coarse)').matches) {
        setTimeout(() => inp.scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 250);
      }
    }
  }

  const AMOUNT_INPUT_IDS = ['amt', 'cash', 'loan', 'salary'];

  function amountInputHtml(id, attrs = '', value) {
    const val = value != null && value !== '' ? ` value="${String(value).replace(/"/g, '&quot;')}"` : '';
    return `<input type="text" class="amount-entry" id="${id}" inputmode="none" readonly autocomplete="off" ${attrs}${val}>`;
  }

  function findAmountInputs(m) {

  function prepareAmountInput(inp) {
    inp.type = 'text';
    inp.readOnly = true;
    inp.inputMode = 'none';
    inp.autocomplete = 'off';
    inp.classList.add('amount-entry');

  function createAmountKeypad() {
    const pad = document.createElement('div');
    pad.className = 'modal-keypad';
    pad.setAttribute('role', 'group');
    pad.setAttribute('aria-label', 'Amount keypad');
    const keys = ['1', '2', '3', '4', '5', '6', '7', '8', '9', 'back', '0', 'clear'];
    pad.innerHTML = keys.map(k => {
      const label = k === 'back' ? '⌫' : k === 'clear' ? 'C' : k;
      const cls = k === 'back' ? 'keypad-btn keypad-back' : k === 'clear' ? 'keypad-btn keypad-clear' : 'keypad-btn';
      return `<button type="button" class="${cls}" data-key="${k}">${label}</button>`;
    }).join('');
    return pad;
  }

  function wireAmountKeypad(modal, inputs) {
    inputs.forEach(prepareAmountInput);
    let activeInput = inputs[0];

    function setActive(inp) {
      activeInput = inp;
      inputs.forEach(i => i.classList.toggle('is-active', i === inp));
    }

    inputs.forEach(inp => {
      inp.addEventListener('click', () => setActive(inp));
      inp.addEventListener('focus', () => setActive(inp));
    });
    setActive(activeInput);

    const keypad = modal.querySelector('.modal-keypad');
    if (!keypad) return;

    keypad.querySelectorAll('[data-key]').forEach(btn => {
      btn.onclick = () => {
        const key = btn.dataset.key;
        let v = activeInput.value || '';
        if (key === 'back') {
          activeInput.value = v.slice(0, -1);
        } else if (key === 'clear') {
          activeInput.value = '';
        } else {
          if (v === '0') v = '';
          activeInput.value = v + key;
        }
        activeInput.dispatchEvent(new Event('input', { bubbles: true }));
      };
    });
  }

  function setupModalAmountKeypad(m) {
    const inputs = findAmountInputs(m);
    if (!inputs.length || m.classList.contains('modal-with-keypad')) return;

    const body = document.createElement('div');
    body.className = 'modal-body';
    while (m.firstChild) body.appendChild(m.firstChild);

    const layout = document.createElement('div');
    layout.className = 'modal-layout';
    layout.appendChild(body);
    layout.appendChild(createAmountKeypad());

    m.classList.add('modal-with-keypad');
    m.appendChild(layout);
    wireAmountKeypad(m, inputs);
  }

  function runLottery(winnerId, entrantIds) {
    const winner = getPlayer(winnerId);
    if (!winner) return { ok: false, err: 'Winner not found.' };

    const entrants = entrantIds.map(id => getPlayer(id)).filter(Boolean);
    const broke = entrants.filter(p => p.cash < LOTTERY_PLAYER_AMOUNT);
    if (broke.length) {
      return { ok: false, err: `Cannot afford ${money(LOTTERY_PLAYER_AMOUNT)} entry: ${broke.map(p => p.name).join(', ')}` };
    }

    const prize = lotteryPrizeFromEntrantCount(entrants.length);
    const snap = captureSnapshot(state.players.map(p => p.id));
    snap.jackpot = state.jackpot;

    entrants.forEach(p => { p.cash -= LOTTERY_PLAYER_AMOUNT; });
    winner.cash += prize;

    const entrantNote = entrants.length
      ? `Entrants (${money(LOTTERY_PLAYER_AMOUNT)} each): ${entrants.map(p => p.name).join(', ')}`
      : 'No player entries';
    const note = `Bank ${money(LOTTERY_BANK_AMOUNT)} + ${entrants.length} × ${money(LOTTERY_PLAYER_AMOUNT)}. ${entrantNote}`;
    logTxn('lottery_draw', prize, 'bank', winnerId, note, snap);
    state.players.forEach(trackPeak);
    save();
    render();
    playSound('win');
    return { ok: true, prize };
  }

      const canAfford = p.cash >= LOTTERY_PLAYER_AMOUNT;
      return `<div class="lottery-entrant">

    openModal(`<h3>🎰 Lottery</h3>
      <p style="font-size:0.9rem;color:var(--text-muted)">Bank antes ${money(LOTTERY_BANK_AMOUNT)}. Each player may optionally ante ${money(LOTTERY_PLAYER_AMOUNT)}. Play out the lottery with the game die, then select the winner below.</p>
      <div class="lottery-prize" id="lot-prize">Prize: ${money(LOTTERY_BANK_AMOUNT)}</div>
      <p><strong>Player entries (optional)</strong></p>
      <div class="confirm-detail">${entrantRows}</div>

      <p class="error-msg"></p>

        <button type="button" class="btn" data-x>Cancel</button>
        <button type="button" class="btn btn-lottery" data-ok>Award Winner</button>
      </div>`, m => {
      function getEntrants() {
        return state.players.filter(p => {
          const cb = m.querySelector(`#ent-${p.id}`);

      function updatePrize() {
        const n = getEntrants().length;

      state.players.forEach(p => {

      updatePrize();
      const getWinnerId = wirePlayerPicker(m);

      m.querySelector('[data-ok]').onclick = () => {
        const winnerId = getWinnerId();
        if (!winnerId) { modalErr(m, 'Select a winner'); return; }
        const winner = getPlayer(winnerId);
        const entrantIds = getEntrants().map(p => p.id);
        const broke = entrantIds.map(id => getPlayer(id)).filter(p => p && p.cash < LOTTERY_PLAYER_AMOUNT);
        if (broke.length) { modalErr(m, `Some entrants cannot afford ${money(LOTTERY_PLAYER_AMOUNT)}.`); return; }
        const prize = lotteryPrizeFromEntrantCount(entrantIds.length);
        openConfirmModal({
          title: 'Confirm Lottery',
          message: `Award <strong>${money(prize)}</strong> to <strong>${esc(winner.name)}</strong>?`,
          detailHtml: `
            <div class="payday-line"><span>Bank contribution</span><span>${money(LOTTERY_BANK_AMOUNT)}</span></div>
            <div class="payday-line"><span>Player entries</span><span>${entrantIds.length} × ${money(LOTTERY_PLAYER_AMOUNT)}</span></div>
            <div class="payday-line total"><span>Total prize</span><span>${money(prize)}</span></div>`,
          confirmText: 'Award Prize',
          onConfirm: () => {
            const r = runLottery(winnerId, entrantIds);
            if (!r.ok) modalErr(m, r.err);

      };

  function actionManageBills(playerId) {
    const p = getPlayer(playerId);
    const list = p.bills.map(b => `<div class="bill-item"><span>${esc(b.description)} — ${money(b.amount)}</span>
      <span>${iconBtn('💳', 'Pay', 'btn btn-sm btn-labeled', `data-pay="${b.id}"`)}
      ${iconBtn('🗑️', 'Remove', 'btn btn-sm btn-labeled btn-danger', `data-rm="${b.id}"`)}</span></div>`).join('') || '<p>No bills.</p>';
    openModal(`<h3>Bills — ${esc(p.name)}</h3><div class="bill-list">${list}</div>
      <div class="modal-actions"><button type="button" class="btn btn-block" data-x>Close</button></div>`, m => {
      m.querySelector('[data-x]').onclick = closeModal;
      m.querySelectorAll('[data-pay]').forEach(btn => btn.onclick = () => {
        const b = p.bills.find(x => x.id === btn.dataset.pay);
        if (!b) return;

        function payBill() {
          const snap = captureSnapshot([playerId]);
          p.cash -= b.amount;
          p.bills = p.bills.filter(x => x.id !== b.id);
          logTxn('bill_paid', b.amount, playerId, 'bank', b.description, snap);
          save(); render(); closeAllModals(); actionManageBills(playerId);
        }

        if (p.cash < b.amount) {
          const shortfall = b.amount - p.cash;
          const loanAmt = calcAutoLoanAmount(shortfall);
          const msg = loanAmt > shortfall
            ? `Insufficient cash. Take a <strong>${money(loanAmt)}</strong> loan?<br><span style="font-size:0.9rem;color:var(--text-muted)">${money(shortfall)} needed, rounded to ${money(loanIncrement())} increments.</span>`
            : `Insufficient cash. Take a <strong>${money(loanAmt)}</strong> loan?`;
          openConfirmModal({
            title: 'Confirm Loan',
            message: msg,
            confirmText: 'Take Loan',
            onConfirm: () => {
              const r = applyAutoLoan(p, shortfall);
              if (!r.ok) {
                openConfirmModal({ title: 'Cannot Take Loan', message: esc(r.err), confirmText: 'OK', cancelText: 'Close', onConfirm: () => {} });
                return;
              }
              payBill();
            }
          });
          return;
        }
        payBill();
      });
      m.querySelectorAll('[data-rm]').forEach(btn => btn.onclick = () => {
        const snap = captureSnapshot([playerId]);
        const b = p.bills.find(x => x.id === btn.dataset.rm);
        p.bills = p.bills.filter(x => x.id !== btn.dataset.rm);
        if (b) logTxn('manual_adjustment', b.amount, playerId, 'bank', 'Bill removed: ' + b.description, snap);
        save(); render(); closeModal(); actionManageBills(playerId);
      });
    });
  }

  /* ---- Render ---- */
  function getLeaders() {
    if (!state.players.length) return [];
    const maxNet = Math.max(...state.players.map(netWorth));
    return state.players.filter(p => netWorth(p) === maxNet);
  }

  function getMostDebtors() {
    if (!state.players.length) return [];
    const maxLoan = Math.max(...state.players.map(p => p.loan));
    if (maxLoan <= 0) return [];
    return state.players.filter(p => p.loan === maxLoan);
  }

  function formatLeaderSummary() {
    const leaders = getLeaders();
    if (!leaders.length) return '—';
    if (leaders.length === 1) return leaders[0].name;
    return 'Tie: ' + leaders.map(p => p.name).join(', ');
  }

  function formatDebtSummary() {
    const debtors = getMostDebtors();
    if (!debtors.length) return 'None';
    const amt = money(debtors[0].loan);
    if (debtors.length === 1) return `${debtors[0].name} ${amt}`;
    return `Tie: ${debtors.map(p => p.name).join(', ')} (${amt})`;
  }

    if (state.summaryOpen === undefined) state.summaryOpen = !isMobileView();

    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { console.warn(e); }

    initPanelDefaults();

  function playerStatusClasses(p, leaderIds, leaderTie) {
    const bt = billsTotal(p);
    const isLeader = leaderIds.has(p.id);
    let cls = '';
    if (isLeader && !leaderTie) cls += ' is-leader';
    if (isLeader && leaderTie) cls += ' is-tied';
    if (p.cash < 0) cls += ' negative';
    if (bt > 0) cls += ' has-bills';
    if (p.loan > 0) cls += ' has-loan';
    return cls;
  }

  function filteredHistory() {
    const q = ($('#history-search')?.value || '').toLowerCase();
    const fp = $('#history-filter-player')?.value || '';
    const ft = $('#history-filter-type')?.value || '';
    return state.transactions.filter(t => {
      if (fp && t.from !== fp && t.to !== fp) return false;
      if (ft && t.type !== ft) return false;
      if (q && !(t.note || '').toLowerCase().includes(q) && !playerName(t.from).toLowerCase().includes(q) && !playerName(t.to).toLowerCase().includes(q)) return false;
      return true;

  function computeStats() {
    const stats = {};
    state.players.forEach(p => {
      stats[p.id] = { loans: 0, earned: 0, paid: 0, billsPaid: 0, jackpotWins: 0 };
    });
    let largest = { amount: 0, who: '' };
    state.transactions.forEach(t => {
      if (t.type === 'loan_taken' && stats[t.from]) stats[t.from].loans += t.amount;
      if (t.type === 'bank_payment' && stats[t.to]) stats[t.to].earned += t.amount;
      if (t.type === 'bank_deposit' && stats[t.from]) stats[t.from].paid += t.amount;
      if (t.type === 'bill_paid' && stats[t.from]) stats[t.from].billsPaid += t.amount;
      if ((t.type === 'jackpot_payout' || t.type === 'jackpot_six' || t.type === 'lottery_draw') && stats[t.to]) stats[t.to].jackpotWins += t.amount;
      if (t.amount > largest.amount) largest = { amount: t.amount, who: playerName(t.from) + ' → ' + playerName(t.to) };
    });
    const mostLoans = state.players.reduce((a, b) => (stats[a.id]?.loans||0) >= (stats[b.id]?.loans||0) ? a : b);
    const mostEarned = state.players.reduce((a, b) => (stats[a.id]?.earned||0) >= (stats[b.id]?.earned||0) ? a : b);
    const mostPaid = state.players.reduce((a, b) => (stats[a.id]?.paid||0) >= (stats[b.id]?.paid||0) ? a : b);
    const mostBills = state.players.reduce((a, b) => (stats[a.id]?.billsPaid||0) >= (stats[b.id]?.billsPaid||0) ? a : b);
    const peak = state.players.reduce((a, b) => (state.peakBalances[a.id]||0) >= (state.peakBalances[b.id]||0) ? a : b);
    const mostJack = state.players.reduce((a, b) => (stats[a.id]?.jackpotWins||0) >= (stats[b.id]?.jackpotWins||0) ? a : b);
    return { mostLoans, mostEarned, mostPaid, mostBills, peak, mostJack, largest };
  }

  function renderStats() {
    const s = computeStats();
    const loanTotal = id => state.transactions.filter(t => t.type === 'loan_taken' && t.from === id).reduce((a, t) => a + t.amount, 0);
    const stat = id => state.transactions.reduce((acc, t) => {
      if (t.type === 'bank_payment' && t.to === id) acc.earned += t.amount;
      if (t.type === 'bank_deposit' && t.from === id) acc.paid += t.amount;
      if (t.type === 'bill_paid' && t.from === id) acc.bills += t.amount;
      if ((t.type === 'jackpot_payout' || t.type === 'jackpot_six' || t.type === 'lottery_draw') && t.to === id) acc.jack += t.amount;
      return acc;
    }, { earned: 0, paid: 0, bills: 0, jack: 0 });
    $('#stats-grid').innerHTML = [
      ['Most Loans Taken', `${s.mostLoans.name} — ${money(loanTotal(s.mostLoans.id))}`],
      ['Most Money Earned', `${s.mostEarned.name} — ${money(stat(s.mostEarned.id).earned)}`],
      ['Most Money Paid', `${s.mostPaid.name} — ${money(stat(s.mostPaid.id).paid)}`],
      ['Most Bills Paid', `${s.mostBills.name} — ${money(stat(s.mostBills.id).bills)}`],
      ['Highest Balance Reached', `${s.peak.name} — ${money(state.peakBalances[s.peak.id] || 0)}`],
      ['Largest Transaction', `${money(s.largest.amount)} (${s.largest.who})`],
      ['Most Jackpot Wins', `${s.mostJack.name} — ${money(stat(s.mostJack.id).jack)}`]
    ].map(([h, v]) => `<div class="stat-card"><h3>${h}</h3><div class="val">${esc(v)}</div></div>`).join('');
  }

  function renderLeaderboard() {
    const sorted = [...state.players].sort((a, b) => netWorth(b) - netWorth(a));
    $('#leaderboard-list').innerHTML = sorted.map((p, i) => {
      const nw = netWorth(p);
      const tied = sorted.filter(x => netWorth(x) === nw).length > 1;
      const rank = sorted.findIndex(x => netWorth(x) === nw) + 1;
      const label = tied ? `${rank}. ${esc(p.name)} (tied)` : `${rank}. ${esc(p.name)}`;
      return `<li><span>${label}</span><span>${money(nw)}</span></li>`;
    }).join('');
  }

  function wakeLockSupported() {
    return 'wakeLock' in navigator;
  }

  async function releaseWakeLock() {
    if (!wakeLock) return;
    try { await wakeLock.release(); } catch (e) { /* ignore */ }
    wakeLock = null;
  }

  async function updateWakeLock() {
    if (!wakeLockSupported()) return;
    const want = state.keepAwake !== false && document.visibilityState === 'visible';
    if (!want) {
      await releaseWakeLock();
      return;
    }
    if (wakeLock) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => {
        wakeLock = null;
        if (state.keepAwake !== false && document.visibilityState === 'visible') updateWakeLock();
      });
    } catch (e) { /* unsupported, denied, or low battery */ }
  }

  function renderWakeLockButton() {
    const btn = $('#btn-awake');
    if (!btn) return;
    const supported = wakeLockSupported();
    btn.hidden = !supported;
    if (!supported) return;
    const on = state.keepAwake !== false;
    btn.innerHTML = on
      ? '<span class="btn-icon" aria-hidden="true">☀️</span><span class="btn-text">Stay Awake</span>'
      : '<span class="btn-icon" aria-hidden="true">🌙</span><span class="btn-text">Allow Sleep</span>';
    btn.title = on ? 'Screen stays on while app is open' : 'Screen may dim normally';
  }

  function renderHeader() {
    const collapsed = state.headerCollapsed !== false;
    const header = $('#app-header');
    const toggle = $('#btn-header-toggle');
    header.classList.toggle('expanded', !collapsed);
    toggle.textContent = collapsed ? '▼' : '▲';
    toggle.title = collapsed ? 'Expand header' : 'Collapse header';
    toggle.setAttribute('aria-expanded', String(!collapsed));
    renderWakeLockButton();
    renderGamePanels();
    renderPlayerBoardHint();
  }

  function render() {
    document.documentElement.dataset.theme = state.theme || 'light';
    renderHeader();
    if (!state.gameStarted) {
      $('#view-setup').hidden = false;
      $('#view-game').hidden = true;
      renderSetup();
      updateWakeLock();
      return;
    }
    $('#view-setup').hidden = true;
    $('#view-game').hidden = false;
    renderSummary();
    renderPlayers();
    renderHistory();
    renderBanker();
    renderStats();
    renderLeaderboard();
    updateWakeLock();
  }

  function switchTab(tab) {
    ['game','banker','history','stats','leaderboard'].forEach(t => {
      $('#tab-' + t).hidden = t !== tab;
      $$('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    });
  }

  function startGame() {
    const names = [...$$('[data-name]')].map(i => i.value.trim());
    const salaries = [...$$('[data-sal]')].map(i => parseFloat(i.value));
    const start = parseFloat($('#setup-starting').value);
    if (names.some(n => !n)) { $('#setup-error').textContent = 'All names required.'; return; }
    if (new Set(names.map(n => n.toLowerCase())).size !== names.length) { $('#setup-error').textContent = 'Names must be unique.'; return; }
    if (!isFinite(start) || start < 0) { $('#setup-error').textContent = 'Invalid starting balance.'; return; }
    state.enforceIncrements = $('#setup-enforce-increments').checked;
    state.startingBalance = start;
    state.jackpot = 0;
    state.transactions = [];
    state.peakBalances = {};
    state.players = names.map((n, i) => defaultPlayer(n, salaries[i] || 3500, start));
    state.gameStarted = true;
    $('#setup-error').textContent = '';
    save(); render();
  }

  function exportCSV(rows, filename) {
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = filename;
    a.click();
  }

  function confetti() {
    const c = $('#confetti-canvas');
    c.hidden = false;
    const ctx = c.getContext('2d');
    c.width = innerWidth; c.height = innerHeight;
    const pieces = Array.from({length: 120}, () => ({ x: Math.random()*c.width, y: -20-Math.random()*c.height, r: 4+Math.random()*6, c: `hsl(${Math.random()*360},80%,55%)`, vy: 2+Math.random()*4, vx: -2+Math.random()*4 }));
    let frame = 0;
    function draw() {
      ctx.clearRect(0,0,c.width,c.height);
      pieces.forEach(p => { p.x+=p.vx; p.y+=p.vy; ctx.fillStyle=p.c; ctx.fillRect(p.x,p.y,p.r,p.r); });
      frame++;
      if (frame < 180) requestAnimationFrame(draw); else { c.hidden = true; }
    }
    draw();
  }

  function showWinner() {
    const leaders = getLeaders();
    const ov = document.createElement('div');
    ov.className = 'winner-overlay';
    const body = leaders.length === 1
      ? `<h2>🎉 Winner!</h2><p style="font-size:1.5rem;font-weight:800">${esc(leaders[0].name)}</p><p>Net worth: ${money(netWorth(leaders[0]))}</p>`
      : `<h2>🤝 It's a Tie!</h2><p style="font-size:1.25rem;font-weight:800">${esc(leaders.map(p => p.name).join(', '))}</p><p>Net worth: ${money(netWorth(leaders[0]))}</p>`;
    ov.innerHTML = `<div class="winner-card">${body}${iconBtn('✖️', 'Close', 'btn btn-primary btn-block btn-labeled', 'style="margin-top:1rem"')}</div>`;
    ov.querySelector('button').onclick = () => ov.remove();
    document.body.appendChild(ov);
    confetti(); playSound('win');
  }

  function bind() {
    $('#setup-count').onchange = renderSetup;
    $('#btn-start').onclick = startGame;
    $('#btn-header-toggle').onclick = () => {
      state.headerCollapsed = !state.headerCollapsed;
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { console.warn(e); }
      renderHeader();
    };
    $('#btn-theme').onclick = () => { state.theme = state.theme === 'dark' ? 'light' : 'dark'; save(); render(); };
    $('#btn-sound').onclick = () => {
      soundsOn = !soundsOn;
      $('#btn-sound').innerHTML = soundsOn
        ? '<span class="btn-icon" aria-hidden="true">🔊</span><span class="btn-text">Sound</span>'
        : '<span class="btn-icon" aria-hidden="true">🔇</span><span class="btn-text">Sound</span>';
    };
    $('#btn-awake').onclick = () => {
      state.keepAwake = state.keepAwake === false;
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { console.warn(e); }
      renderWakeLockButton();
      updateWakeLock();
    };
    document.addEventListener('visibilitychange', () => updateWakeLock());
    document.addEventListener('pointerdown', () => updateWakeLock(), { passive: true });
    $('#btn-game-options').onclick = openGameOptions;
    $('#btn-undo').onclick = () => undo(1);
    $('#btn-undo-multi').onclick = () => { const n = parseInt(prompt('How many transactions to undo?', '1'), 10); if (n > 0) undo(n); };
    $('#btn-clear-history').onclick = () => { if (confirm('Clear transaction history? Balances unchanged.')) { state.transactions = []; save(); render(); } };
    $('#btn-export-txn').onclick = () => exportCSV([['Time','Type','Amount','From','To','Note'], ...state.transactions.map(t => [new Date(t.timestamp).toISOString(), TXN_LABELS[t.type]||t.type, t.amount, playerName(t.from), playerName(t.to), t.note])], 'payday-transactions.csv');
    $('#btn-export-balances').onclick = () => exportCSV([['Player','Cash','Loan','Bills','Net Worth','Paydays'], ...state.players.map(p => [p.name, p.cash, p.loan, billsTotal(p), netWorth(p), p.paydayCount])], 'payday-balances.csv');
    $('#btn-export-json').onclick = () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(state,null,2)])); a.download = 'payday-save.json'; a.click(); };
    $('#btn-print').onclick = () => window.print();
    $('#btn-import').onclick = () => $('#import-file').click();
    $('#import-file').onchange = e => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = () => { try { state = { ...defaultState(), ...JSON.parse(r.result) }; save(); render(); } catch { alert('Invalid file'); } };
      r.readAsText(f);
    };
    $('#btn-winner').onclick = showWinner;
    $$('.nav-btn').forEach(b => b.onclick = () => switchTab(b.dataset.tab));
    $('#history-search').oninput = renderHistory;
    $('#history-filter-player').onchange = renderHistory;
    $('#history-filter-type').onchange = renderHistory;

    $('#btn-toggle-summary').onclick = () => {
      initPanelDefaults();
      state.summaryOpen = !state.summaryOpen;
      persistStateQuiet();
      renderGamePanels();
    };
    $('#btn-toggle-jackpot').onclick = () => {
      initPanelDefaults();
      state.jackpotOpen = !state.jackpotOpen;
      persistStateQuiet();
      renderGamePanels();
    };
    $('#player-actions-bar').onclick = e => {
      const b = e.target.closest('[data-a]');
      if (!b) return;
      const a = b.dataset.a;
      const handler = ACTION_HANDLERS[a];
      if (!handler) return;
      promptPlayerForAction(ACTION_LABELS[a] || a, pid => handler(pid), ACTION_SUBTITLES[a]);
    };

    document.querySelector('.jackpot-actions').onclick = e => {
      const b = e.target.closest('[data-action]');
      if (!b) return;
      ({ 'jackpot-contrib-player': openPlayerContributeModal, 'jackpot-six': actionJackpotRollSix, 'lottery': actionLottery })[b.dataset.action]?.();
    };

    document.onkeydown = e => { if (e.key === 'Escape') closeModal(); };
  }

  load();
  soundsOn = false;
  bind();
  render();
})();

if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
  </script>
</body>
</html>
